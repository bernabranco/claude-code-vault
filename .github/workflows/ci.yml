name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Install web dependencies
        run: cd web && npm install && cd ..

      - name: Type check (CLI)
        run: npx tsc --noEmit --allowJs --skipLibCheck index.js lib/*.js test/retrieval/eval.js test/retrieval/status_filter.test.js test/vault-write.test.js test/section-edit.test.js test/stubs-and-suggestions.test.js test/query-log.test.js test/glossary.test.js

      - name: Type check (web)
        run: cd web && npx tsc --noEmit && cd ..

      - name: Build web
        run: npm run build

      - name: CLI smoke tests
        run: |
          node index.js --version
          node index.js --help
          node index.js index
          node index.js search "architecture" --limit 3

      - name: Vault lint (errors fail CI, warnings/info annotate PR)
        run: node index.js lint --format github

      - name: Retrieval eval (recall@5 vs baseline)
        run: node test/retrieval/eval.js --gate 2 --warn-gate 0.5

      - name: Status-aware retrieval assertions
        run: node test/retrieval/status_filter.test.js

      - name: Vault write-back assertions
        run: node test/vault-write.test.js

      - name: Section-edit assertions
        run: node test/section-edit.test.js

      - name: Stubs + suggested-links assertions
        run: node test/stubs-and-suggestions.test.js

      - name: Query-miss log assertions
        run: node test/query-log.test.js

      - name: Glossary resolution assertions
        run: node test/glossary.test.js

      - name: Lint web (if eslintrc exists)
        run: cd web && npm run lint 2>/dev/null || echo "No lint script defined"
        continue-on-error: true
